workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Flutter Clean
        script: flutter clean
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK (Debug)
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk